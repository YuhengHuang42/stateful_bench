task: "session"

env:
  # Base endpoint of your session service under test.
  # Example: local docker -> http://localhost:8080
  base_url: "http://localhost:8080"

  # Output folders for generated traces and agent metadata.
  trace_save_path: "/data/stateful_bench/session_trace"
  agent_save_path: "/data/stateful_bench/session_trace/agent_data"

  # Fill at least one provider key used by your runtime.
  openai_api_key: ""
  google_api_key: ""
  open_source_api_key: ""
  open_source_base_url: "https://api.lambda.ai/v1"

generation_config:
  # API reference used by the generator.
  api_doc_file: "api_doc/session-service.json"
  api_doc_file_simplified: "api_doc/session-service-simplified.txt"
  use_api_structured_output: true

  # Ratio of generated traces to run through mutation/repair logic.
  modification_ratio: 0.3

  # Workload size.
  num_of_tests: 60
  num_of_apis: 5

  # 4 means "no explicit control-flow block".
  # Session traces usually work better with later control positions.
  control_position_candidate: [3, 4]

  trace_config:
    # Number of initial explicit local states.
    init_local_state_num_range: [2, 3]
    # Number of initial implicit states (background/system side effects).
    init_implicit_state_num_range: [3, 6]

agent_config:
  # Retry/repair rounds per generated case.
  max_iterations: 3
  # False -> run one test case per agent loop (easier debugging).
  batch_mode: false
  # Sampling temperature for generation.
  temperature: 1.0
